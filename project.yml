name: CutTrack
options:
  bundleIdPrefix: dk.blbit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: ""
targets:
  CutTrack:
    type: application
    platform: iOS
    sources:
      - path: CutTrack
      - path: Shared
    resources:
      - path: CutTrack/Resources
    info:
      path: CutTrack/Info.plist
    entitlements:
      path: CutTrack/CutTrack.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.blbit.cuttrack
        PRODUCT_NAME: CutTrack
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: CutTrackWidgets

  CutTrackWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CutTrackWidgets
      - path: Shared
    info:
      path: CutTrackWidgets/Info.plist
    entitlements:
      path: CutTrackWidgets/CutTrackWidgets.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.blbit.cuttrack.widgets
        PRODUCT_NAME: CutTrackWidgets
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
